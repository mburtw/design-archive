<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Case for Consumption</title>

<style>

/* RESET */

body{
margin:0;
font-family:sans-serif;
cursor:none;
background:white;
}


/* CUSTOM CURSOR */

.cursor{

width:10px;
height:10px;

background:black;

border-radius:50%;

position:fixed;

pointer-events:none;

z-index:9999;

transform:translate(-50%,-50%);

transition:all .15s ease;

}

.cursor.clickable{

background:white;
border:4px solid black;
width:14px;
height:14px;

}


/* NAVIGATION */

.navbar{

position:fixed;

top:0;
left:0;
right:0;

display:flex;
justify-content:space-between;

padding:24px 40px;

background:white;

z-index:1000;

}

.navbar a{

text-decoration:none;
color:black;
margin-left:24px;

}


/* HOME AREA */

.home{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

}


/* SELECTION WHEEL */

.wheel{

position:relative;

width:600px;
height:600px;

border-radius:50%;

transition:transform 1s linear;

}


/* ITEMS */

.item{

position:absolute;

width:80px;

opacity:.5;

transition:
transform .3s,
opacity .3s;

}

.item img{

width:100%;
display:block;

}

.item.active{

transform:scale(1.8);
opacity:1;

z-index:10;

}

</style>

</head>


<body>

<div class="cursor"></div>


<nav class="navbar">

<div>
<a href="index.html">A Case for Consumption</a>
</div>

<div>

<a href="pages/films.html">Films</a>
<a href="pages/books.html">Books</a>
<a href="pages/writing.html">Writing</a>
<a href="pages/info.html">Info</a>

</div>

</nav>


<div class="home">

<div class="wheel" id="wheel"></div>

</div>



<script>

/* CURSOR */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

})

document.querySelectorAll("a").forEach(el=>{

el.addEventListener("mouseenter",()=>cursor.classList.add("clickable"))
el.addEventListener("mouseleave",()=>cursor.classList.remove("clickable"))

})


/* CONTENT ITEMS */

const items=[

{img:"images/books/B_1.png",link:"pages/books.html"},
{img:"images/books/B_2.png",link:"pages/books.html"},
{img:"images/films/M_1.png",link:"pages/films.html"},
{img:"images/films/M_2.png",link:"pages/films.html"},
{img:"images/films/M_3.png",link:"pages/films.html"}

]


/* BUILD WHEEL */

const wheel=document.getElementById("wheel")

const total=10

for(let i=0;i<total;i++){

const random=items[Math.floor(Math.random()*items.length)]

const el=document.createElement("a")

el.className="item"

el.href=random.link

el.innerHTML=`<img src="${random.img}">`

const angle=(i/total)*360

el.style.transform=
`rotate(${angle}deg) translate(250px) rotate(-${angle}deg)`

wheel.appendChild(el)

}


/* CLOCK HAND SELECTION */

const wheelItems=document.querySelectorAll(".item")

document.querySelector(".home").addEventListener("mousemove",e=>{

const rect=wheel.getBoundingClientRect()

const cx=rect.left+rect.width/2
const cy=rect.top+rect.height/2

const angle=Math.atan2(e.clientY-cy,e.clientX-cx)

let index=Math.round(
((angle+Math.PI)/(2*Math.PI))*wheelItems.length
)

wheelItems.forEach(i=>i.classList.remove("active"))

if(wheelItems[index]){
wheelItems[index].classList.add("active")
}

})


/* SLOW ROTATION */

let rotation=0

function spin(){

rotation+=0.02

wheel.style.transform=`rotate(${rotation}deg)`

requestAnimationFrame(spin)

}

spin()


</script>


</body>
</html>
