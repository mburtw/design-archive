<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Case for Consumption</title>

<style>

/* ---------- BASIC PAGE ---------- */

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:white;
cursor:none;
}

/* ---------- CUSTOM CURSOR ---------- */

.cursor{
width:10px;
height:10px;
background:black;
border-radius:50%;
position:fixed;
pointer-events:none;
z-index:9999;
transform:translate(-50%,-50%);
transition:all .15s ease;
}

.cursor.clickable{
background:white;
border:4px solid black;
width:14px;
height:14px;
}


/* ---------- NAVIGATION ---------- */

.navbar{
position:fixed;
top:0;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:26px 40px;
background:white;
z-index:1000;
}

.navbar a{
text-decoration:none;
color:black;
margin-left:28px;
font-size:14px;
}


/* ---------- CENTER PREVIEW ---------- */

.preview{
position:fixed;
top:42%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
pointer-events:none;
}

.preview h1{
font-size:46px;
margin:0;
}

.preview p{
font-size:14px;
opacity:.6;
}


/* ---------- WHEEL AREA ---------- */

.wheel{
position:fixed;
bottom:-240px;
left:50%;
transform:translateX(-50%);
width:1400px;
height:900px;
}


/* ---------- ITEMS ---------- */

.item{
position:absolute;
width:80px;
opacity:.35;
filter:grayscale(100%);
transition:
transform .35s,
opacity .35s,
filter .35s;
}

.item img{
width:100%;
display:block;
}

.item.active{
transform:scale(2.2);
opacity:1;
filter:none;
z-index:999;
}

.item.near{
transform:translateY(-12px);
}


/* ---------- FLOAT BUTTON ---------- */

.skip{
position:fixed;
bottom:30px;
right:30px;
padding:14px 24px;
border-radius:28px;
background:black;
color:white;
text-decoration:none;
font-size:14px;
z-index:1000;
}

</style>

</head>



<body>

<div class="cursor"></div>


<nav class="navbar">

<div>
<a href="index.html">A Case for Consumption</a>
</div>

<div>
<a href="pages/films.html">Films</a>
<a href="pages/books.html">Books</a>
<a href="pages/writing.html">Writing</a>
<a href="pages/info.html">Info</a>
</div>

</nav>


<div class="preview">
<h1 id="previewTitle">Archive</h1>
<p>Move the cursor across the collection</p>
</div>


<div class="wheel" id="wheel"></div>


<a class="skip" href="pages/films.html">Just take me to the lists</a>



<script>

/* ---------------- CURSOR ---------------- */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

document.querySelectorAll("a").forEach(el=>{
el.addEventListener("mouseenter",()=>cursor.classList.add("clickable"))
el.addEventListener("mouseleave",()=>cursor.classList.remove("clickable"))
})


/* ---------------- ENTRIES ---------------- */

const entries=[

/* FILMS */

{img:"images/films/M_1.png",page:"pages/films.html",title:"Film 1"},
{img:"images/films/M_2.png",page:"pages/films.html",title:"Film 2"},
{img:"images/films/M_3.png",page:"pages/films.html",title:"Film 3"},
{img:"images/films/M_4.png",page:"pages/films.html",title:"Film 4"},
{img:"images/films/M_5.png",page:"pages/films.html",title:"Film 5"},
{img:"images/films/M_6.png",page:"pages/films.html",title:"Film 6"},
{img:"images/films/M_7.png",page:"pages/films.html",title:"Film 7"},
{img:"images/films/M_8.png",page:"pages/films.html",title:"Film 8"},
{img:"images/films/M_9.png",page:"pages/films.html",title:"Film 9"},
{img:"images/films/M_10.png",page:"pages/films.html",title:"Film 10"},
{img:"images/films/M_11.png",page:"pages/films.html",title:"Film 11"},
{img:"images/films/M_12.png",page:"pages/films.html",title:"Film 12"},
{img:"images/films/M_13.png",page:"pages/films.html",title:"Film 13"},
{img:"images/films/M_14.png",page:"pages/films.html",title:"Film 14"},
{img:"images/films/M_15.png",page:"pages/films.html",title:"Film 15"},
{img:"images/films/M_16.png",page:"pages/films.html",title:"Film 16"},
{img:"images/films/M_17.png",page:"pages/films.html",title:"Film 17"},
{img:"images/films/M_18.png",page:"pages/films.html",title:"Film 18"},

/* BOOKS */

{img:"images/books/B_1.png",page:"pages/books.html",title:"Book 1"},
{img:"images/books/B_2.png",page:"pages/books.html",title:"Book 2"},
{img:"images/books/B_3.png",page:"pages/books.html",title:"Book 3"}

]


/* -------- SORT SO NEWEST APPEAR CENTER -------- */

entries.sort((a,b)=>{

let numA=parseInt(a.img.match(/\d+/))
let numB=parseInt(b.img.match(/\d+/))

return numB-numA

})


/* -------- BUILD SEMICIRCLE -------- */

const wheel=document.getElementById("wheel")
const total=entries.length

entries.forEach((entry,i)=>{

const el=document.createElement("a")

el.className="item"
el.href=entry.page
el.dataset.title=entry.title

el.innerHTML=`<img src="${entry.img}">`

/* ARC */

const spread=160
const start=-80

const angle=(start+(i*(spread/(total-1))))*(Math.PI/180)

/* DEPTH */

const depth=1-(i/total)

const radius=520+(depth*120)

const x=Math.cos(angle)*radius
const y=Math.sin(angle)*radius

el.style.left=700+x+"px"
el.style.top=580+y+"px"

el.style.zIndex=100-i

el.style.transform=`scale(${0.6+(depth*0.6)})`

wheel.appendChild(el)

})


const items=document.querySelectorAll(".item")

const title=document.getElementById("previewTitle")


/* -------- CLOCK HAND SELECTION -------- */

wheel.addEventListener("mousemove",e=>{

cursor.style.opacity=0

let closest=null
let dist=9999

items.forEach(item=>{

const r=item.getBoundingClientRect()

const cx=r.left+r.width/2
const cy=r.top+r.height/2

const d=Math.hypot(cx-e.clientX,cy-e.clientY)

if(d<dist){
dist=d
closest=item
}

})

items.forEach(i=>{
i.classList.remove("active","near")
})

if(closest){

closest.classList.add("active")

title.textContent=closest.dataset.title

items.forEach(i=>{

const r=i.getBoundingClientRect()

const d=Math.hypot(
(r.left+r.width/2)-e.clientX,
(r.top+r.height/2)-e.clientY
)

if(d<200 && i!==closest){
i.classList.add("near")
}

})

}

})


wheel.addEventListener("mouseleave",()=>{

cursor.style.opacity=1

items.forEach(i=>{
i.classList.remove("active","near")
})

title.textContent="Archive"

})

</script>


</body>
</html>
