<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Case for Consumption</title>

<style>

/* BASIC RESET */

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
cursor:none;
background:white;
}


/* CUSTOM CURSOR */

.cursor{

width:10px;
height:10px;

background:black;

border-radius:50%;

position:fixed;

pointer-events:none;

z-index:9999;

transform:translate(-50%,-50%);

transition:.15s;

}

.cursor.clickable{

background:white;
border:4px solid black;
width:14px;
height:14px;

}


/* NAVIGATION */

.navbar{

position:fixed;

top:0;
left:0;
right:0;

display:flex;
justify-content:space-between;

padding:26px 40px;

background:white;

z-index:1000;

}

.navbar a{

text-decoration:none;
color:black;
margin-left:24px;

}


/* CENTER TEXT PREVIEW */

.preview{

position:fixed;

top:45%;
left:50%;

transform:translate(-50%,-50%);

text-align:center;

pointer-events:none;

}

.preview h1{

font-size:42px;
margin:0;

}

.preview p{

font-size:14px;
opacity:.6;

}


/* WHEEL AREA */

.wheel-area{

position:fixed;

bottom:-200px;
left:50%;

transform:translateX(-50%);

width:1400px;
height:800px;

cursor:none;

}


/* ITEMS */

.item{

position:absolute;

width:120px;

opacity:.35;

filter:grayscale(100%);

transition:

transform .3s,
opacity .3s,
filter .3s;

}

.item img{

width:100%;
display:block;

}

.item.active{

transform:scale(2);

opacity:1;

filter:none;

z-index:10;

}


/* WIGGLE EFFECT */

.item.near{

transform:translateY(-10px);

}


/* FLOAT BUTTON */

.skip{

position:fixed;

bottom:30px;
right:30px;

padding:14px 22px;

border-radius:30px;

background:black;
color:white;

text-decoration:none;

font-size:14px;

z-index:1000;

}

</style>

</head>



<body>


<div class="cursor"></div>


<nav class="navbar">

<div>
<a href="index.html">A Case for Consumption</a>
</div>

<div>

<a href="pages/films.html">Films</a>
<a href="pages/books.html">Books</a>
<a href="pages/writing.html">Writing</a>
<a href="pages/info.html">Info</a>

</div>

</nav>



<div class="preview">

<h1 id="previewTitle">Archive</h1>

<p id="previewDesc">Move the cursor across the collection</p>

</div>



<div class="wheel-area" id="wheel"></div>



<a class="skip" href="pages/films.html">Just take me to the lists</a>



<script>

/* CURSOR */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

})

document.querySelectorAll("a").forEach(el=>{

el.addEventListener("mouseenter",()=>cursor.classList.add("clickable"))
el.addEventListener("mouseleave",()=>cursor.classList.remove("clickable"))

})



/* ITEMS */

const entries=[

{img:"images/books/B_1.png",page:"pages/books.html",type:"Books"},
{img:"images/books/B_2.png",page:"pages/books.html",type:"Books"},
{img:"images/books/B_3.png",page:"pages/books.html",type:"Books"},

{img:"images/films/M_1.png",page:"pages/films.html",type:"Films"},
{img:"images/films/M_2.png",page:"pages/films.html",type:"Films"},
{img:"images/films/M_3.png",page:"pages/films.html",type:"Films"},

{img:"images/films/M_4.png",page:"pages/films.html",type:"Films"},
{img:"images/films/M_5.png",page:"pages/films.html",type:"Films"}

]



/* BUILD SEMI CIRCLE */

const wheel=document.getElementById("wheel")

const total=entries.length

entries.forEach((entry,i)=>{

const el=document.createElement("a")

el.className="item"
el.href=entry.page

el.innerHTML=`<img src="${entry.img}">`

const angle=(-90+(i*(180/(total-1))))*(Math.PI/180)

const radius=700

const x=Math.cos(angle)*radius
const y=Math.sin(angle)*radius

el.style.left=700+x+"px"
el.style.top=600+y+"px"

wheel.appendChild(el)

})



const items=document.querySelectorAll(".item")



/* PREVIEW TEXT */

const title=document.getElementById("previewTitle")



/* CLOCK HAND SELECTION */

wheel.addEventListener("mousemove",e=>{

cursor.style.opacity=0

let closest=null
let dist=9999

items.forEach(item=>{

const rect=item.getBoundingClientRect()

const cx=rect.left+rect.width/2
const cy=rect.top+rect.height/2

const d=Math.hypot(cx-e.clientX,cy-e.clientY)

if(d<dist){
dist=d
closest=item
}

})

items.forEach(i=>{
i.classList.remove("active","near")
})

if(closest){

closest.classList.add("active")

title.textContent=closest.href.includes("books")?"Books":
closest.href.includes("films")?"Films":
closest.href.includes("writing")?"Writing":
"Archive"

items.forEach(i=>{

const r=i.getBoundingClientRect()

const d=Math.hypot(
(r.left+r.width/2)-e.clientX,
(r.top+r.height/2)-e.clientY
)

if(d<200 && i!==closest){
i.classList.add("near")
}

})

}

})



wheel.addEventListener("mouseleave",()=>{

cursor.style.opacity=1

items.forEach(i=>{
i.classList.remove("active","near")
})

title.textContent="Archive"

})

</script>



</body>
</html>
