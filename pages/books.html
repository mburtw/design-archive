<title>Books I've Read This Year</title>

<link rel="stylesheet" href="../style.css">

<style>

/* PAGE */

body{

margin:0;
background:white;
overflow-x:hidden;

}


/* BLACK CIRCLE CURSOR */

body{

cursor:none;

}

.cursor{

width:16px;
height:16px;

background:black;

border-radius:50%;

position:fixed;

pointer-events:none;

z-index:1000;

transform:translate(-50%,-50%);

}


/* BOOK STACK */

.book-container{

display:flex;

align-items:flex-end;

height:85vh;

padding:120px 40px;

overflow:hidden;

}


/* BOOK */

.book{

position:relative;

width:28vw;

min-width:260px;

margin-left:-18vw;

transition:

transform .4s ease,
margin .4s ease;

cursor:pointer;

}


/* FIRST BOOK */

.book:first-child{

margin-left:0;

}


/* BOOK IMAGE */

.book img{

width:100%;

display:block;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}


/* ACTIVE BOOK */

.book.active{

transform:translateY(-30px) scale(1.05);

z-index:20;

}


/* SHUFFLE EFFECT */

.book-container:hover .book{

transform:rotate(-1deg);

}

.book:hover{

transform:translateY(-40px) rotate(1deg) scale(1.05);

}


/* BOOK INFO BOX */

.book-info{

position:fixed;

top:40%;

max-width:320px;

background:white;

padding:22px;

box-shadow:0 10px 40px rgba(0,0,0,.2);

opacity:0;

transition:opacity .25s ease;

font-family:sans-serif;

}


.book-info.visible{

opacity:1;

}


.book-title{

font-weight:bold;
font-size:16px;

}

.book-author{

font-weight:bold;
margin-top:6px;

}

.book-year{

margin-top:4px;

}

.book-text{

margin-top:12px;
font-size:14px;

}

</style>

</head>

<div class="cursor"></div>
<body>


<div class="cursor"></div>

<div class="book-info" id="bookInfo">

<div class="book-title"></div>

<div class="book-author"></div>

<div class="book-year"></div>

<div class="book-text"></div>

</div>



<script>

/* CUSTOM CURSOR */

const cursor = document.querySelector(".cursor")

document.addEventListener("mousemove", e => {

cursor.style.left = e.clientX + "px"
cursor.style.top = e.clientY + "px"

})


/* BOOK HOVER */

const books = document.querySelectorAll(".book")

const info = document.getElementById("bookInfo")

const title = info.querySelector(".book-title")
const author = info.querySelector(".book-author")
const year = info.querySelector(".book-year")
const text = info.querySelector(".book-text")


books.forEach(book=>{

book.addEventListener("mouseenter", ()=>{

books.forEach(b=>b.classList.remove("active"))

book.classList.add("active")

const data = book.querySelector(".data")

title.textContent = data.dataset.title
author.textContent = data.dataset.author
year.textContent = data.dataset.year
text.textContent = data.dataset.text

info.classList.add("visible")

})

})


/* FLOAT INFO LEFT OR RIGHT */

document.addEventListener("mousemove", e=>{

if(e.clientX < window.innerWidth/2){

info.style.right="40px"
info.style.left="auto"

}else{

info.style.left="40px"
info.style.right="auto"

}

})

</script>

<script>

const cursor = document.querySelector(".cursor")

document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX+"px"
cursor.style.top = e.clientY+"px"
})


/* CLICKABLE DETECTION */

const clickable = "a, button, .film, .book"

document.querySelectorAll(clickable).forEach(el=>{

el.addEventListener("mouseenter", ()=>{
cursor.classList.add("clickable")
})

el.addEventListener("mouseleave", ()=>{
cursor.classList.remove("clickable")
})

})

</script>
</body>
